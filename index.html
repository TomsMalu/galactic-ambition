<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galactic Ambition - DB Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; }
        .stats-card { border: 1px solid #f39c12; padding: 20px; border-radius: 10px; }
        .pc-display { font-size: 2.5rem; color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
    </style>
</head>
<body class="container py-5">
    <div class="text-center mb-5">
        <h1>GALACTIC AMBITION</h1>
        <p class="text-muted">Simulador Sistémico V8.1</p>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="stats-card">
                <h3>Personaje: <span id="char-name">Tomás</span></h3>
                <p>PC Actual:</p>
                <div class="pc-display" id="pc-val">20,252</div>
                <hr>
                <p>Zenis: <span id="zeni-val">45,000</span></p>
                <p>Fricción Actual: <span id="fric-val">1.00</span>x</p>
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="d-grid gap-3">
                <button class="btn btn-outline-warning btn-lg" onclick="handleTrain(7)">Entrenar Intenso (I=7)</button>
                <button class="btn btn-outline-danger btn-lg" onclick="handleExplore()">Explorar Sector (1 PA)</button>
                <div id="log" class="mt-4 p-3 bg-dark border rounded" style="height: 200px; overflow-y: auto;">
                    > Esperando órdenes...
                </div>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script>
        function updateUI() {
            document.getElementById('pc-val').innerText = player.pc.toLocaleString();
            document.getElementById('fric-val').innerText = Math.exp(player.pc / player.u).toFixed(4);
        }
        function handleTrain(i) {
            const msg = train(i);
            const log = document.getElementById('log');
            log.innerHTML += `<div>> ${msg}</div>`;
            updateUI();
        }
    </script>
</body>
</html>
