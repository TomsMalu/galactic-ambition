<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Ambition V8.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; }
        .stats-card { border: 1px solid #f39c12; padding: 20px; border-radius: 12px; background: #1e1e1e; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .pc-display { font-size: 2.8rem; color: #f1c40f; font-weight: bold; }
        #log { font-size: 0.85rem; background: #000 !important; border: 1px solid #333; }
        .btn-action { font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body class="container py-5">
    <div class="text-center mb-5">
        <h1 style="letter-spacing: 5px;">GALACTIC AMBITION</h1>
        <p class="text-warning">Simulador de Progresión Sistémica</p>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="stats-card">
                <h3 id="char-name">Cargando...</h3>
                <hr style="border-color: #444;">
                <p class="text-muted small mb-0">PODER DE PELEA (PC):</p>
                <div class="pc-display mb-3" id="pc-val">0</div>
                <div class="d-flex justify-content-between">
                    <span>Zenis:</span> <span id="zeni-val" class="text-warning">0</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Fricción:</span> <span id="fric-val" class="text-info">1.0000x</span>
                </div>
                <div class="d-flex justify-content-between mt-3 fw-bold">
                    <span>PA:</span> <span class="text-primary"><span id="pa-val">0</span> / 4</span>
                </div>
                <button class="btn btn-dark btn-sm w-100 mt-4" onclick="resetGame()">Reiniciar Personaje</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="d-grid">
                <button class="btn btn-outline-warning btn-lg btn-action" onclick="handleTrain(7)">Entrenar Intenso (1 PA)</button>
                <button class="btn btn-outline-danger btn-lg btn-action" onclick="handleExplore()">Explorar Sector (1 PA)</button>
                <button class="btn btn-primary btn-action" onclick="nextMonth()">Siguiente Mes (Recuperar PA)</button>
            </div>

            <div id="log" class="mt-4 p-3 rounded" style="height: 250px; overflow-y: auto;">
                <div class="text-muted">> Omni-Engine V8.2 inicializado...</div>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
