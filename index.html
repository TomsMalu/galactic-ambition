<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Ambition - DB Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; }
        .stats-card { border: 1px solid #f39c12; padding: 20px; border-radius: 10px; background: #222; }
        .pc-display { font-size: 2.5rem; color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .pa-display { font-size: 1.5rem; color: #3498db; }
        #log { font-size: 0.9rem; border-color: #444 !important; }
        .btn-lg { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="container py-5">
    <div class="text-center mb-5">
        <h1>GALACTIC AMBITION</h1>
        <p class="text-muted">Simulador Sistémico V8.1 - Edición Tomás</p>
    </div>

    <div class="row">
        <!-- Columna de Estadísticas -->
        <div class="col-md-4 mb-4">
            <div class="stats-card">
                <h3><span id="char-name">Tomás</span></h3>
                <p class="mb-1 text-muted text-uppercase small">Poder de Pelea (PC):</p>
                <div class="pc-display mb-3" id="pc-val">20,252</div>
                
                <hr style="border-color: #444;">
                
                <div class="d-flex justify-content-between mb-2">
                    <span>Zenis:</span>
                    <span id="zeni-val" class="text-warning">45,000</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Fricción:</span>
                    <span id="fric-val" class="text-info">1.0041x</span>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <span class="fw-bold">PA:</span>
                    <span class="pa-display"><span id="pa-val">4</span> / 4</span>
                </div>
            </div>
        </div>
        
        <!-- Columna de Acciones y Log -->
        <div class="col-md-8">
            <div class="d-grid gap-3">
                <!-- Botones de Acción principal -->
                <button class="btn btn-outline-warning btn-lg" onclick="handleTrain(7)">
                    Entrenar Intenso (I=7)
                </button>
                <button class="btn btn-outline-danger btn-lg" onclick="handleExplore()">
                    Explorar Sector (1 PA)
                </button>
                
                <!-- Botón de Gestión de Tiempo -->
                <button class="btn btn-primary btn-sm mt-2" onclick="nextMonth()">
                    Descansar (Siguiente Mes / Recuperar PA)
                </button>

                <!-- Consola de Log -->
                <div id="log" class="mt-4 p-3 bg-dark border rounded" style="height: 250px; overflow-y: auto;">
                    <div class="text-muted">> Sistema inicializado. Esperando órdenes...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Importante: El engine.js debe cargarse primero -->
    <script src="engine.js"></script>
</body>
</html>
